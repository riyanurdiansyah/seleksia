name: Node.js CI/CD Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only run this job if the commit message contains "#deploy#"
    if: contains(github.event.head_commit.message, '#deploy#')

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 20m
          script: |
            set -e
            echo "=== STARTING DOCKER DEPLOYMENT ==="
            cd /var/www/seleksia
            
            # Reset local changes in production if any, and pull latest code
            git reset --hard
            git pull origin master
            
            # Build and launch all containers (web, ws, db) in detached mode
            docker compose up --build -d
            
            # Run Prisma database migrations inside the running Next.js container
            docker compose exec -T web npx prisma migrate deploy
            
            # Clean up old unused Docker builds/images to prevent VPS disk space from running out
            docker image prune -f
            
            echo "=== DOCKER DEPLOYMENT COMPLETED SUCCESSFULLY ==="
