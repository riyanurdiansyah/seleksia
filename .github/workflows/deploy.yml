name: Node.js CI/CD Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only run this job if the commit message contains "#deploy#"
    if: contains(github.event.head_commit.message, '#deploy#')

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 20m
          script: |
            set -e
            echo "=== STARTING DOCKER DEPLOYMENT ==="
            cd /var/www/seleksia
            
            # Reset local changes in production if any, and pull latest code
            git reset --hard
            git pull origin master
            
            # Build images first (keeps old container running during build to prevent downtime)
            docker compose build
            
            # Stop and remove old containers to guarantee port 3000 is released
            docker compose down
            
            # Force stop any Docker container that is publishing port 3000 (just in case of orphaned containers)
            docker ps -q --filter "publish=3000" | xargs -r docker stop || true
            
            # Kill any other process listening on port 3000 (e.g. native node process)
            kill -9 $(lsof -t -i:3000) 2>/dev/null || true
            
            # Launch new containers
            docker compose up -d
            
            # Run Prisma database migrations inside the running Next.js container
            docker compose exec -T web npx prisma migrate deploy
            
            # Clean up old unused Docker builds/images to prevent VPS disk space from running out
            docker image prune -f
            
            echo "=== DOCKER DEPLOYMENT COMPLETED SUCCESSFULLY ==="
