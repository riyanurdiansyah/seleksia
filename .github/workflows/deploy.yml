name: Node.js CI/CD Deploy to PC Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: self-hosted
    if: contains(github.event.head_commit.message, '#deploy#')

    steps:
      - name: Tarik Kode Terbaru dari GitHub
        uses: actions/checkout@v4

      - name: Deploy Aplikasi via Docker
        run: |
          set -e
          echo "=== STARTING DOCKER DEPLOYMENT ==="
          
          echo "Deploying branch: ${{ github.ref_name }}"
          echo "Commit SHA: ${{ github.sha }}"

          # Build images first
          docker compose build
          
          # Stop and remove old containers
          docker compose down
          
          # Force stop any Docker container that is publishing port 3001 (Port untuk Aplikasi 1)
          docker ps -q --filter "publish=3001" | xargs -r docker stop || true
          
          # Kill any other process listening on port 3001
          kill -9 $(lsof -t -i:3001) 2>/dev/null || true
          
          # Launch new containers
          docker compose up -d
          
          # Run Prisma database migrations inside the running Next.js container (Nama service: web-app-1)
          docker compose exec -T web-app-1 npx prisma migrate deploy
          
          # Clean up old unused Docker builds/images
          docker image prune -f
          
          echo "=== DOCKER DEPLOYMENT COMPLETED SUCCESSFULLY ==="