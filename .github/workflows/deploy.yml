name: Node.js CI/CD Deploy to PC Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: self-hosted
    # Proses hanya berjalan jika pesan commit mengandung teks #deploy#
    if: contains(github.event.head_commit.message, '#deploy#')

    steps:
      - name: Tarik Kode Terbaru dari GitHub
        uses: actions/checkout@v4

      # --- INJEKSI FILE .ENV ---
      # Mengambil file .env dari folder asli di PC Anda 
      # lalu menaruhnya ke ruang kerja agen GitHub Actions
      - name: Siapkan File .env
        run: |
          echo "Menyalin file .env dari folder ~/projects/seleksia ke workspace..."
          cp ~/projects/seleksia/.env .

      - name: Deploy Aplikasi via Docker
        run: |
          set -e
          echo "=== STARTING DOCKER DEPLOYMENT ==="
          
          echo "Deploying branch: ${{ github.ref_name }}"
          echo "Commit SHA: ${{ github.sha }}"

          # 1. Nyalakan Database TERLEBIH DAHULU
          # Ini wajib agar Next.js dan Prisma bisa melakukan prerender saat proses build
          docker compose up -d db-app-1
          
          # Beri jeda 10 detik agar database benar-benar siap dan menerima koneksi
          echo "Menunggu database siap..."
          sleep 10
          
          # 2. Build image aplikasi web (sekarang file .env sudah terbaca dengan aman)
          docker compose build web-app-1
          
          # 3. Matikan paksa proses lama yang masih menyangkut di port 3001
          docker ps -q --filter "publish=3001" | xargs -r docker stop || true
          kill -9 $(lsof -t -i:3001) 2>/dev/null || true
          
          # 4. Nyalakan container web versi terbaru
          docker compose up -d web-app-1
          
          # 5. Eksekusi sinkronisasi database Prisma di dalam container web yang sedang berjalan
          docker compose exec -T web-app-1 npx prisma db push --accept-data-loss
          
          # 6. Masukkan data template email bawaan (Seed) jika belum ada
          docker compose exec -T web-app-1 npx tsx scripts/seed-email-templates.ts || true
          
          # 6. Bersihkan image Docker versi lama agar penyimpanan SSD PC tetap lega
          docker image prune -f
          
          echo "=== DOCKER DEPLOYMENT COMPLETED SUCCESSFULLY ==="