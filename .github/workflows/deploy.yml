name: Node.js CI/CD Deploy to PC Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: self-hosted
    if: contains(github.event.head_commit.message, '#deploy#')

    steps:
      - name: Tarik Kode Terbaru dari GitHub
        uses: actions/checkout@v4

      # --- TAMBAHAN BARU: Menjemput file .env ---
      - name: Siapkan File .env
        run: |
          echo "Menyalin file .env dari folder server ke dalam workspace GitHub Actions..."
          cp ~/projects/seleksia/.env .

      - name: Deploy Aplikasi via Docker
        run: |
          set -e
          echo "=== STARTING DOCKER DEPLOYMENT ==="
          
          # 1. Nyalakan Database DULU agar saat web di-build, databasenya sudah hidup
          docker compose up -d db-app-1
          
          # Beri jeda 5 detik agar database benar-benar siap
          sleep 5
          
          # 2. Build image Next.js (sekarang file .env sudah terbaca karena langkah di atas)
          docker compose build web-app-1
          
          # 3. Matikan paksa jika ada yang nyangkut di port 3001 (Aplikasi 1)
          docker ps -q --filter "publish=3001" | xargs -r docker stop || true
          kill -9 $(lsof -t -i:3001) 2>/dev/null || true
          
          # 4. Nyalakan container web yang baru selesai di-build
          docker compose up -d web-app-1
          
          # 5. Jalankan sinkronisasi struktur database (Prisma)
          docker compose exec -T web-app-1 npx prisma migrate deploy
          
          # 6. Bersihkan sampah image Docker lama agar SSD lega
          docker image prune -f
          
          echo "=== DOCKER DEPLOYMENT COMPLETED SUCCESSFULLY ==="